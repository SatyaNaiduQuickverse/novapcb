    - "Master 3h.7 housekeeping flag — reconcile exact Cat-A pin count (headline 28 vs enumeration ~25 vs label 22)"

decision_forks_watched:
  a2-recheck:
    fork: "A2 re-run on post-3i netlist: every hwdef-assigned pin is connected OR a documented-intentional omission?"
    expected_classes: [a2-pass-clean, a2-residual-cat-b]
    pre_recommendation: "Expect PASS: USART1 PA9/PA10 now connected (3i); CAN1 PD0/PD1/PD3 reclassified Cat-C (deliberate v1-omit per OPEN_QUESTIONS CLOSED phase3exit-can); remaining unconnected pins all in documented Cat-A (Phase 2-exit Part B intentional Matek-inheritance cruft)."
    actual_resolution: "A2 PASSED CLEAN. 63 hwdef-assigned MCU pins; 46 connected to nets; 28 unconnected = 25 Cat-A intentional cruft + 3 Cat-C deliberate v1-omit (CAN) + **0 Cat-B real omissions**. USART1 confirmed connected via 3i. Telem and CAN both resolved per master adjudication."
    resolved_via: "inline (A2 enumeration script reproduces classification; per-pin Cat assignment with reason cite)"

  cat-a-count:
    fork: "Cat-A pin count reconciliation (master 3h.7 housekeeping flag)"
    expected_classes: [count-exact-28-25-3, count-different]
    pre_recommendation: "Re-enumerate from script output; previously cited 22/25/28 numbers were partial enumerations. The 28-total is correct: 25 Cat-A intentional + 3 Cat-C CAN."
    actual_resolution: "Exact reconciled: 28 total unconnected = 25 Cat-A + 3 Cat-C + 0 Cat-B. Both Cat-A 25 and total 28 documented in PHASE3_AUDIT.md A2 section with per-pin enumeration table."
    resolved_via: "inline"

escalation_log: []

