  pr:
    title: "Phase 3-exit: re-audit (A2 PASS clean) + carry-forward consolidation + 08:00 retro fold"
    branch: hw/phase-3-exit-2026-05-20

pass_criteria:
  # PART A — re-audit (high-value, gating)
  - "A1: Cold rebuild of novapcb.net + generate.erc — verify SKiDL ERC 0 errors / 67 warnings (post-3i baseline); netlist 0 errors; rail-uniqueness guard PASS. Reproducible from generate.py alone."
  - "A2: hwdef-completeness re-check post-3i. Every hwdef-assigned MCU pin is either connected to a net in novapcb.net OR a documented-intentional omission (Cat-A inherited cruft per Phase 2-exit Part B / Cat-C deliberate v1-omit per OPEN_QUESTIONS CLOSED entries). PASS clean = 0 Cat-B real omissions remaining. FAIL = Rule 13 STOP."
  - "A3: CONFIDENCE_MAP rows 1-14 coherent — every row cites a 3x sheet (or DEFER-to-Phase-X) and reflects the merged state on main (post-3i)."
  - "A4: OPEN_QUESTIONS.md internal consistency — Phase 3 CLOSED-entries (phase3-render-1 dispatched; phase3exit-can deliberate v1-omit) correctly labeled; v2-1 + phase2a-1 + phase2exit-1 remain open."

  # PART B — Phase 4 carry-forward consolidation
  - "B1: PHASE3_AUDIT.md lists the 7 Phase 4 carry-forward items from REFERENCE_AUDIT.md consolidated single-table — items + which row/subsystem + Phase 4 owner placeholder. NOT re-litigated; this is a hand-off."
  - "B2: DEFER-TO-6.5 + Phase 6 sim consolidated table (mirrors REFERENCE_AUDIT.md 'DEFER-TO-Phase-6.5' section) — passes through to Phase 4 unchanged + flagged for Phase 4 task-contract dispatch."
  - "B3: PRIORITY-Phase-9-bench (Mauch HS-200-LV 9.0/60.6 calibration) flagged in PHASE3_AUDIT.md so Phase 4/9 work doesn't lose it."

  # PART C — 08:00 retro fold
  - "C1: retrospectives/2026-05-20T0800.md created per RETROSPECTIVES.md template. Worker section (~5 bullets per of 4 sections) + cross-review. Master section paste-in placeholder (master 08:00 retro section was attached to the Phase 3-exit dispatch; post-compaction text not in worker context — master pastes verbatim on audit or chat-in)."

  # Standing
  - "Three-dot diff origin/main...HEAD verified before push."
  - "Working tree clean (no stray SKiDL artifacts)."
  - "DESIGN_PHASES.md Phase 3-exit row → DONE; Phase 3 fully closed (3a-3i + 3.5 + 3-exit)."

estimated_context_kb: 50
estimated_wallclock: "60-90 min (A2 re-run + Parts B + C + doc updates)"

notes: |
  Phase 3-exit is the Phase 3 gate. A2 (hwdef-completeness) is the
  load-bearing check — it caught the USART1 telem omission on the
  first pass (master adjudicated NEEDS-FIX → Phase 3i). With 3i
  merged, A2 re-runs and is expected to PASS clean.

  Cat-A pin count reconciliation (master 3h.7 housekeeping flag): the
  prior pings cited 22, 25, and 28 in different places — the 28-total
  is correct (25 Cat-A intentional + 3 Cat-C deliberate v1-omit + 0
  Cat-B = 28 unconnected). PHASE3_AUDIT.md A2 section has the
  per-pin enumeration table to settle the count.

  After this PR merges, Phase 3 is fully closed (3a-3i + 3.5 + 3-exit).
  Phase 4 (PCB layout) opens with its own P0 routing-approach
  investigation (master 06:00 heads-up: Freerouting vs pcbnew-scripted
  vs hybrid; realistic-scale-tested per Phase 3 smoke-test lesson).
