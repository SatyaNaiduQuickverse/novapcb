prediction:
  worker_pre_run_prediction: |
    Per-sub-phase classification (schematic-level vs layout-dependent):
      Tier-1 (schematic-level, run NOW): 6a power tree, 6h ADC noise/LPF,
        6d I²C pullup analysis, 6e UART rise-time, 6i ESD/reverse-polarity gap
        inventory, 6j thermal lumped-element, 6k EMC analytical Fourier.
        6b USB diff pair (Hammerstad-Jensen already done Phase 4d) — also Tier-1
        analytical, deeper post-4f for actual routed length.
      Tier-2 (gates on Phase 4f): 6c IMU SPI SI, 6f SDMMC SI, 6g DShot SI,
        6m manufacturability.
      Already done: 6l SITL (PR #52 merged).
      Deferred: 6b/6k OpenEMS deep validation (post-Sai-handoff), 6j Elmer
        deep validation (post-Sai-handoff).

    For 6a specifically (per 6P0.6 — "RUN IT if fully schematic-level"):
      Likely PASS the load-step droop (cap network is well-sized).
      Likely CAUTION on PDN impedance (anti-resonance @ 100 kHz between bulk
        and decoupling cap groups — common in mini-FC PDN design).
      Likely CAUTION on inrush (5.7µF input bulk charging in 10µs ramp).
      Likely PASS the BOR check (mcuconf inspection).

    Net Tier-1 outcome prediction: most PASS, 2-4 CAUTION findings that
    feed Phase 6.5 forum review queue.

decision_forks_watched:
  power-6a-runnow:
    fork: "Is 6a runnable now (fully schematic-level) per 6P0.6?"
    expected_classes: [yes-run-now, partial-runnable, no-defer-to-post-4f]
    pre_recommendation: "YES — AP2112K LDO + cap network is fully defined from schematic + datasheets; routed trace parasitics REFINE but don't DEFINE the response. PDN impedance + load-step + inrush + BOR all computable from schematic-level inputs."
    actual_resolution: "RAN — 1 PASS + 2 CAUTION + 1 INFO. CAUTIONs are real engineering signals (anti-resonance + inrush) feeding Phase 6.5 forum review; no NO-GO."
    resolved_via: "sims/power-6a/results.md"

escalation_log:
  - timestamp: "2026-05-20"
    sub: "6a.1 PDN impedance — PySpice AC current source magnitude"
    finding: "PySpice's CurrentSource doesn't expose AC magnitude parameter. Workaround: subprocess ngspice with raw netlist string."
    resolution: "Switched 6a + 6d + 6h + 6i + 6g + 6c to subprocess ngspice; PySpice retained for transient analyses (6a.2/6a.3) which DO expose dc_value cleanly."
  - timestamp: "2026-05-20"
    sub: "6a.1 PDN impedance — LDO model interpretation"
    finding: "Including a finite-Z LDO model in AC analysis at 5Ω → over-clamped the 100Hz region. The 100 kHz – 10 MHz band of interest is ABOVE the LDO loop bandwidth where the LDO is effectively open; modeling LDO as open at AC and letting the caps own Z(f) is the correct convention."
    resolution: "AC analysis runs cap-network-only. 100 mΩ target exceeded at 100 kHz (133 mΩ peak — anti-resonance bulk vs decoupling). Documented as CAUTION because real LDO would clamp the peak."

