    - hardware/kicad/novapcb/sheets/power_3b.py
    - hardware/kicad/novapcb/sheets/common.py
    - docs/CONFIDENCE_MAP.md
    - docs/OPEN_QUESTIONS.md
  refs:
    - "hwdef.dat:36-39 — SPI1 SCK/MISO/MOSI/CS pin assignments for ICM-42688 (PA5/PA6/PD7/PC15). AUTHORITATIVE per Phase 3 hwdef-cited discipline."
    - "hwdef.dat:203 — SPIDEV icm42688 SPI1 DEVID1 IMU1_CS MODE3 2*MHZ 16*MHZ"
    - "hwdef.dat:207 — DMA_NOSHARE SPI1* (dedicated DMA streams)"
    - "hwdef.dat:234 — IMU Invensensev3 SPI:icm42688 ROTATION_YAW_180 (polled mode)"
