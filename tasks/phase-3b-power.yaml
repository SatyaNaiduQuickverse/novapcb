notes: |
  3b surfaced two real SKiDL gotchas while implementing the contract — both
  added to hardware/kicad/KICAD9_NOTES.md as Phase 3b lessons:

  1. PWR_FLAG no-footprint error: SKiDL's default empty-footprint handler
     errors on virtual symbols. Override via skidl.empty_footprint_handler
     (added _virtual_part_footprint_handler() in sheets/common.py).

  2. Net('name') creates a NEW net even if the name exists — SKiDL auto-
     appends _1, _2 to disambiguate. mcu_3a's Net('+3V3') + power_3b's
     Net('+3V3') created TWO separate nets (+3V3 and +3V3_1) with the
     same intended name but no electrical connection. The MCU's VDD pins
     and the LDO's VOUT would have been on different nets — silent
     topology bug, would have shown up at first power-on. Fix: use
     skidl.Net.fetch('name') for shared nets. Wrapped as n() in common.py.

  ERC pin-conflict on the resolved net: when the LDO VOUT (POWER-OUT pin)
  is on the same net as a PWR_FLAG (also POWER-OUT pin), KiCad ERC errors
  with "Pin conflict: POWER-OUT <==> POWER-OUT" — only one POWER-OUT
  source per net. Rule for novapcb power tree: PWR_FLAG goes ONLY on nets
  that pass through passives (ferrite, 0R) from a real POWER-OUT pin, or
  on input nets whose real source is in another sheet.

  Both lessons committed in hardware/kicad/KICAD9_NOTES.md (the cross-
  machine source-of-truth doc per master's 03:00 retro directive).
