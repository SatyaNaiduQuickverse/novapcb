pass_criteria:
  - "3h.1: hwdef.dat:32-33 (SWD), 68-69 (ADC), 74-76 + 91-92 (BATT defines + Phase 2g Mauch scales), 183-188 (SDMMC) grep'd + cited. Wiring matches hwdef.dat exactly — verified by guard PASS."
  - "3h.2: Power-monitor block — JST-GH 6P Mauch connector + RC filters (1k + 100nF on each ADC input). Pin map per Pixhawk DS-009. User-side DF-13→JST-GH adapter note flagged in docstring."
  - "3h.3: microSD block — Hirose DM3AT-SF-PEJM5 socket via SD_Card_Device symbol. SDMMC1 4-bit wiring per hwdef.dat:183-188. 5× 47 kΩ pull-ups on CMD + D0-D3. 100 nF VDD decoupling. Card-detect mechanical switch pin Phase 4-deferred."
  - "3h.4: SWD block — ARM Cortex Debug 10-pin 1.27mm header (Conn_ARM_JTAG_SWD_10). VTref=+3V3, SWDIO=PA13, SWCLK=PA14, ~RESET=NRST (shared via n() from mcu_3a). Pins 6/7/8 NC (SWO + KEY + TDI). +Mechanical sym-lib-table entry for MountingHole_Pad."
  - "3h.5: 4× M3 MountingHole_Pad GND-tied for EMC drain. Phase 2.5 P1.1 36×36 mm board / 30.5×30.5 mm c-to-c geometry."
  - "3h.6: Pipeline result — SKiDL ERC 0 errors / 67 warnings (DOWN 6 from 3g's 73 — 10 MCU pins newly connected (PC0/PC1/PC8/PC9/PC10/PC11/PC12/PD2/PA13/PA14) minus 3 SWD-header NC pins + minor delta from new components). generate_netlist 0 errors / 148 warnings (harmless random-tag warnings, more parts). Rail-uniqueness guard PASSED. SDMMC1 + SWD + BATT nets all unique."
  - "3h.7: CONFIDENCE_MAP rows 7 (~87 → 88%) + 10 (~89 → 89% + 3h evidence row appended) updated. Row 13 (thermal) not material to 3h — no update."
  - "3h.8: SOTA self-audit in PR body. Authoritative: hwdef.dat (all 3 pin maps) + Pixhawk DS-009 (Mauch connector) + ARM standard (SWD) + SD spec (pull-ups). PHASE 3 SCHEMATIC CAPTURE COMPLETE — every hwdef peripheral has a sheet."

