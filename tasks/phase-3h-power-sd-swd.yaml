decision_forks_watched:
  mauch-connector:
    fork: "Mauch HS-200-LV power-module connector type + pinout"
    expected_classes: [jst-gh-6p, per-mauch-spec]
    pre_recommendation: "JST-GH 6P per DECISIONS §7"
    actual_resolution: "JST-GH 6-pin (SM06B-GHS-TB horizontal). Pin map per Pixhawk DS-009 6-pin power-module standard: 1=VCC(+5V Mauch BEC), 2=VCC paralleled, 3=VBAT_analog (post 9:1 LV divider), 4=CURRENT_analog (Hall offset-shifted), 5=GND, 6=GND paralleled. **User-side caveat documented in sheet docstring**: Mauch HS-200-LV factory ships DF-13 6P; novapcb v1 user uses Mauch 065 'Power-Cube output cable JST-GH/6p' adapter OR fabricates DF-13→JST-GH pigtail. Standard Pixhawk-vs-Matek interface choice. Flagged for Phase 9 bring-up user docs."
    resolved_via: "inline (DECISIONS §7 + Pixhawk DS-009 + Mauch product 075/065 research)"
  adc-filter:
    fork: "RC filter on the VBAT + CURRENT ADC inputs"
    expected_classes: [series-r-plus-cap, cap-only, inherit-matek]
    pre_recommendation: "series R + cap LPF; MatekH743 values if sourceable, else datasheet-grounded"
    actual_resolution: "Series 1 kΩ + 100 nF X7R to GND on each ADC input (VBAT + CURRENT). LPF cutoff ~1.6 kHz — rejects DShot600 (600 kHz) + ESC PWM (25-50 kHz) noise; comfortably passes battery dynamics (sub-Hz). 1 kΩ source impedance OK for STM32H743 ADC (100 MΩ input). MatekH743 exact values not sourceable locally; this is datasheet-grounded standard practice. Phase 6h sim validates settling/accuracy; Phase 3.5 cross-checks vs MatekH743 if sourceable."
    resolved_via: "inline (datasheet-grounded standard LPF + Phase 6h sim flagged)"
  sdmmc-pullups:
    fork: "SDMMC CMD + D0-D3 pull-up handling"
    expected_classes: [external-resistors, card-internal, inherit-matek]
    pre_recommendation: "external resistors per SD spec + Phase 2h INTERFACE_CONTRACT 'external pull-ups Phase 4 layout concern'"
    actual_resolution: "External 47 kΩ pull-ups on CMD + D0-D3 (5 resistors). Per SD Association 4-bit spec (range 10-100 kΩ; 47 kΩ is the middle/standard). Phase 2h INTERFACE_CONTRACT noted 'no PULL directive in novapcb or MatekH743; external pull-ups belong on the board' — schematic 3h is where they're captured. CLK NOT pulled (MCU drives idle). MatekH743 exact value not sourceable locally."
    resolved_via: "inline (SD spec + Phase 2h Phase-4-deferral resolution)"

