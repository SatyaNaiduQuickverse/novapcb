notes: |
  H743 timer + DMA constraints summary (verify each by RM citation,
  NOT from memory):

  - TIM1, TIM8 are advanced timers — best for DShot due to dedicated
    update events. Each has 4 channels.
  - TIM2-5 are 32-bit general-purpose timers — also DShot-capable.
  - TIM12-17 are smaller — channel count + DMA support varies. CHECK
    THE RM before assigning DShot to these.
  - DMA1/DMA2 each have 8 streams. Each stream serves one peripheral
    request at a time via DMAMUX. Conflicts between PWM-DMA and
    SPI/I²C/UART/SDMMC-DMA are common allocation traps.

  If MatekH743's PWM block uses TIM1/TIM8 + safe DMA streams, that's
  the inherit path. If anything looks marginal, Rule 13 stop and
  escalate — H743 DMA allocation bugs are post-fab nightmares.

  BIDIR-DShot is nice-to-have for motor RPM telemetry. Not required
  for v1 to fly. If 1-2 channels don't support BIDIR, that's OK —
  document and move on.
