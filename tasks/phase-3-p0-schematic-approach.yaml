notes: |
  Phase 3 Part 0 is investigation-only. Zero schematic sheets created.

  The hard part — KiCad schematic capture being GUI-native — turned
  out to have a real Python solution: SKiDL 2.2.3 added KiCad 9
  schematic generation support (per its PyPI + GitHub readme). End-
  to-end smoke test confirmed: trivial R+C circuit produces both
  netlist AND .kicad_sch, both consumable by kicad-cli for ERC +
  rendering.

  This neatly resolves the P0.3 tension (code-driven vs human-drawn):
  SKiDL Python is the source of truth + diff-reviewable, the
  generated .kicad_sch is the EE-universal artifact for Phase 6.5
  forum review (rendered to PDF via kicad-cli).

  Recommendation calibration matches master's note: "surely-working
  > elegant" — SKiDL is surely-working (smoke test passes); it's
  also elegant (Python source-of-truth). Win-win on this fork.

  Phase 3 sub-phase rhythm follows Phase 2: per-sheet sub-phases
  (3a MCU/clock/power, 3b IMU, 3c baro, etc.), one PR each, mirror
  the Phase 2 sub-phase cadence master + worker established.
