    - "6l SITL is DONE (PR #52, ArduPilot SITL unchanged by pivot — no re-run)."

prediction:
  worker_pre_run_prediction: |
    Structured into 4 PR blocks (one per logical chunk; falsifiable
    pre-prediction on each; ping master at each).

    --- BLOCK A — Routed-trace SI sims (6b USB, 6c IMU SPI, 6f SDMMC, 6g DShot) ---

    PRED-A1 (6b USB Hammerstad-Jensen vs routed length): With the Step 5
      6-layer USB diff-pair geometry (W=0.30, S=0.10, h=0.21mm L1↔L2,
      εr=4.3, Z_diff=94.4Ω per docs/CONTROLLED_IMPEDANCE.md), the
      USB 2.0 ±15% spec window [85,105]Ω holds. Routed length impacts
      transmission delay + reflection magnitude but not Z0. Expect:
      |Γ| < 0.1 at both ends, eye open at 480 Mbit/s. PASS.

    PRED-A2 (6c IMU SPI ringing): Routed F.Cu trace ~10-15mm to U3,
      24MHz SPI (Pixhawk-typical for ICM-42688-P), no series term
      currently. Expect: settling within 1/2 bit (~21ns) — likely PASS.
      Watch for overshoot >10% requiring a series resistor.

    PRED-A3 (6f SDMMC SI): SDR25 = 12.5 MHz on 4-bit bus, routed
      lengths likely <20mm. Setup/hold easily met at 12.5MHz. PASS.

    PRED-A4 (6g DShot SI): DShot600 = 600kHz fundamental, slow
      compared to USB. Ringing on MOT1-8 traces likely benign. PASS.

    --- BLOCK B — OpenEMS Z0-extraction ---

    PRED-B1 (OpenEMS fix outcome): bounded ~2-3 hour attempt. Start
      fresh from upstream impedance-extraction tutorial (microstrip Z0),
      adapt for the JLC06161H-7628 stackup. Likely outcome split:
        50% — get matched-to-analytical Z0 (within 5%) on a microstrip,
              then port to the diff-pair → 6b uses both methods.
        50% — still cannot make it converge cleanly → document honestly,
              use the Hammerstad-Jensen analytical + Phase 9 bench as
              the impedance floor. NOT fake.

    --- BLOCK C — Re-validate pivot-affected sims ---

    PRED-C1 (6a power tree post-eFuse): The eFuse front-end (Step 2)
      adds U6 (TPS25940), Q2 (P-FET), D1 (TVS). The downstream
      AP2112K LDO + cap network is unchanged. Expect: all rail
      voltages stable; soft-start ramp 50ms; eFuse OCP set 2.08A.
      results_step2_rev.json already exists from Step 2 — re-run on
      current schematic + verify it matches.

    PRED-C2 (6i ESD/input-protection post-pivot): TVS D1 + eFuse U6
      replace the prior "minimal protection gap". Re-assess: TVS
      VBR_min 6.67V protects against transients up to V_clamp. Expect
      now-acceptable protection vs IEC 61000-4-2 ±8kV contact discharge
      (with appropriate trace inductance considered). 6.5 forum review
      probably no longer needed for the input-protection row.

    PRED-C3 (6k EMC post-route): Routed copper changes the radiator/
      antenna picture. Re-run analytical Fourier + add post-route
      check: clock-harmonic coupling into adjacent traces + plane
      gaps. Expect: 16MHz SPI + 12.5MHz SDMMC + 480MHz USB still
      clear of GPS L1 (1.575 GHz) and ELRS 868/915MHz. No coupling
      hotspots if plane-served power keeps return paths short.

    PRED-C4 (6j thermal post-route check): Already done at Step 4 on
      80×60 (LDO 69.8°C, MCU 74.2°C at h=5/50°C, in margin). Convection-
      limited regime; routed copper adds <5% k_eff variation. Expect
      no material change — confirm + move on.

    --- BLOCK D — DFM + fab export ---

    PRED-D1 (DFM JLCPCB 6-layer rules): Default Step 5 net classes
      already meet JLC06161H-7628 minimums (0.10/0.10 trace/space,
      0.20mm min drill, 0.10mm annular). Expect: 0 DFM violations
      against the JLCPCB rule pack.

    PRED-D2 (Gerber/drill/POS/BOM export): Adapt the existing
      hardware/kicad/novapcb-layout/run_gerber_export.py for the 6-layer
      board (extra inner-layer plot list: In1..In4). Expect: all
      stages export clean.

    PRED-D3 (BOM ↔ netlist parity): 83 components per current BOM.
      Schematic netlist export → diff vs BOM CSV → expect 0
      discrepancies (BOM finalized in Phase 5).

    --- ENDPOINT ---

    PRED-E1 (Phase 7a freeze): If A+B+C+D all pass / dispose honestly,
      tag the merged-main commit v1.0-fab-ready-frozen + push tag.
      HARD STOP at Phase 7b — Sai sign-off required for actual order.

acceptance:
  block_a_routed_si:
    - "6b USB diff-pair SI run on actual routed geometry; result PASS or design changed."
    - "6c IMU SPI SI run; setup/hold + ringing PASS or design changed."
    - "6f SDMMC SI run; PASS or design changed."
    - "6g DShot SI run; PASS or design changed."
    - "Each result committed: results.json + results.md + plots."
  block_b_openems:
    - "OpenEMS Z0-extraction either WORKING (matched-to-analytical on a known geometry) or honestly disposed (documented why it can't be made to work; analytical + bench as floor)."
    - "Either way, decision recorded in sims/usb-diffpair-6b/results.md."
  block_c_pivot_revalidation:
    - "6a power tree re-run on current post-Step-2 schematic; results match expected (or design changed)."
    - "6i ESD/input-protection re-assessed post-eFuse-front-end; protection level documented."
    - "6k EMC post-route check run; coupling hotspots identified or absent."
    - "6j thermal post-route confirmation (likely re-use Step 4 result if convection-limited regime holds)."
  block_d_dfm_fab:
    - "DRC against JLCPCB 6-layer rule pack → 0 violations."
    - "run_gerber_export.py updated for 6-layer layout-v2; all stages export clean."
    - "BOM ↔ netlist parity → 0 discrepancies (83 components)."
  endpoint:
    - "All A+B+C+D acceptance items either PASS or have an honest documented disposition with a §2-justified criterion review."
    - "Phase 7a freeze: git tag v1.0-fab-ready-frozen on the merged-main fab-ready commit. Tag pushed."
    - "HARD STOP: Phase 7b (actual fab order) not entered without Sai sign-off."

