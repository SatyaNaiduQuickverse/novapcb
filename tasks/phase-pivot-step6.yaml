gates:
  master_review:
    description: |
      Per-block ping at PR open. Master reviews each PR against its
      block-A/B/C/D acceptance items + the falsifiable PREDs in this
      contract. Bounded master merge-authority covers Step 6 PRs
      (doc + sim + fab-export). The Phase 7a freeze tag is master-
      executable (it does not place an order). Phase 7b is Sai-only.

retrospective:
  hourly_cadence: |
    Per ENGINEERING_RIGOR §9: hourly retro during Step 6 execution.
    Capture PRED-vs-actual deltas per block + any tolerance pressure
    or design-changes-from-failed-sim moments. Master pinged on
    every retro if non-trivial deltas surface.

notes:
