    The Phase 6 P0 scaffolding (committed pre-pivot) authored harnesses
    against the 36×36 4-layer board + pre-eFuse schematic. Step 6 must
    re-run those harnesses against the 80×60 6-layer board + post-eFuse
    schematic. Scaffolds are USED, not re-authored from scratch —
    inputs are updated, scripts re-run.

  what_does_NOT_re_run:
