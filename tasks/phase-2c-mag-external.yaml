estimated_context_kb: 35
estimated_wallclock: "30-90 minutes"

notes: |
  External mag means the IST8310 (or RM3100 alternative) lives on the
  GPS daughter module (off-board) and reaches the FC via the GPS
  connector's I²C lines. The FC's job in hwdef.dat is to (a) expose
  the I²C bus on the GPS port pin assignment, and (b) tell ArduPilot
  which compass chips to expect.

  Per CLAUDE.md §3.5, internal magnetometers are explicitly avoided —
  "Internal mag is too noisy on most FCs." So no internal compass
  driver lines.

  Master+worker iteration 2026-05-20 settled on option (A): explicit
  COMPASS lines for IST8310 + RM3100, drop AP_COMPASS_PROBING_ENABLED.
  Reasoning: matches CLAUDE.md §3.5 "IST8310 or RM3100" exactly; SOTA
  pattern across CUAV-Nora / CUAV-X7 / CarbonixF405 converges on this
  layout; saves flash for compass drivers we don't field; ALL_EXTERNAL
  keeps bus assignment layout-flexible (specific bus → GPS connector
  is a Phase 4 layout decision).

  The Phase 2b YAML citation fix is bundled here per master's
  scope-bundling pattern (small doc edit causally tied to the previous
  sub-phase's catch).
