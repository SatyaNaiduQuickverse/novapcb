  - "AP_COMPASS_PROBING_ENABLED define removed (was inherited from MatekH743's broad-probe approach). HAL_I2C_INTERNAL_MASK 0 retained (no internal I²C compass). HAL_COMPASS_AUTO_ROT_DEFAULT 2 retained."
  - "BUILD_BASELINE.md appended with Phase 2c section: hwdef diff summary, build wall-clock, sha256, flash delta vs 2b (1,534,572 used / 169,356 free)"
  - "SOTA cite (Rule 3 / Rigor §10): MatekH743 hwdef.dat exact line for IST8310 + GPS-port I²C bus exposure. Grep-then-state."
