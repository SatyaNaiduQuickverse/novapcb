decision_forks_watched:
  crsf-connector:
    fork: "CRSF RX connector type + pin count + TX/RX-vs-half-duplex"
    expected_classes: [jst-gh-full, jst-gh-halfduplex]
    pre_recommendation: "JST-GH per DECISIONS §7 + ELRS-standard +5V/TX/RX/GND"
    actual_resolution: "JST-GH 4-pin (SM04B-GHS-TB horizontal). Pin map: +5V/USART6_TX/USART6_RX/GND. Full-duplex TX+RX both routed per ELRS RP4TD standard (CRSF is full-duplex at TTL; half-duplex inverted-S.Port is a different protocol, not novapcb's config — DECISIONS §4 + Phase 2f locked CRSF/ELRS). Inversion/half-duplex flags absent from hwdef per Phase 2f grep — ArduPilot CRSF driver handles polarity at protocol layer."
    resolved_via: "inline (DECISIONS §4 + ELRS standard wiring + Phase 2f lock)"
  usbc-cc-esd:
    fork: "USB-C CC-resistor + ESD-protection configuration"
    expected_classes: [cc-5k1-plus-esd, cc-5k1-only-esd-deferred]
    pre_recommendation: "CC1+CC2 5.1k MANDATORY (USB-C UFP spec); ESD CAPTURED (standard practice, ~$0.10 BOM)"
    actual_resolution: "BOTH CAPTURED. CC1+CC2 5.1 kΩ Rd pulldowns to GND (USB-C device-side enumeration requirement — without Rd the port won't be detected by host at all). USBLC6-2P6 ESD-protection array on D+/D- (ST USB common-mode TVS + 24V clamp, SOT-23-6 ~$0.10 BOM). CONFIDENCE_MAP row 12 small bump (+2%) for this external connector now having proper ESD; rest still LOW (GPS connector + CRSF connector + 5V BEC still ESD-deferred)."
    resolved_via: "inline (USB-C spec hard-requirement + standard ESD practice)"

