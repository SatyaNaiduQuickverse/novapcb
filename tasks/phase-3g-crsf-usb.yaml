notes: |
  3g shipped both blocks. The USB-C 5.1k CC Rd pulldowns are not
  optional — they're spec-mandatory for any USB-C device to be
  detected by the host. The USBLC6-2P6 ESD-array adds ~$0.10 BOM
  for material reduction of USB-D+/D- ESD failure mode (standard
  practice).

  CRSF is straightforward — JST-GH 4P, ELRS-standard +5V/TX/RX/GND.
  Full-duplex per ELRS RP4TD; half-duplex inverted-S.Port is a
  different protocol (Crossfire2 / FrSky), not novapcb's CRSF/ELRS
  target.

  USB diff-pair 90 Ω + length matching is Phase 4 layout work; this
  sheet captures the topology only. USBLC6 placement on the HOST
  side of the cable ESD path is a Phase 4 placement constraint.

  External-connector ESD coverage so far:
    - USB-C: USBLC6-2P6 on D+/D- (3g, this sheet) ✓
    - GPS+mag: NOT captured (Phase 3e deferral to 3.5/6.5/6k)
    - CRSF: NOT captured (Phase 3g — only TX/RX/+5V/GND wires)
    - 5V BEC (Phase 3h): NOT captured (Phase 3b/3h deferral)
  Three external connectors still ESD-uncovered. Phase 3.5 reference
  audit + Phase 6.5 forum review + Phase 6k EMC sim resolve.
